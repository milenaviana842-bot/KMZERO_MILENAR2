{% extends 'KMZERO/base.html' %}
{% load static %}

{% block title %}Cadastro de Atletas{% endblock %}

{% block body %}
<br>
<div class="container">
    <h1>Cadastro de Atleta</h1>

    <form class="row g-3" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="col-12">
            <label for="nome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="nome" name="nome" placeholder="">
        </div>

        <div class="col-6">
            <label for="cpf" class="form-label">CPF</label>
            <input type="text" class="form-control" id="cpf" name="cpf" placeholder="">
        </div>

        <div class="col-md-6">
            <label for="datanascimento" class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="datanascimento" name="datanascimento">
        </div>

        <div class="col-md-6">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email">
        </div>

        <div class="col-md-6">
            <label for="telefone" class="form-label">Telefone</label>
            <input type="text" class="form-control" id="telefone" name="telefone">
        </div>

        <div class="col-12">
            <label for="Endereco" class="form-label">Endereço</label>
            <input type="text" class="form-control" id="Endereco" name="endereco" placeholder="Rua">
        </div>

        <div class="col-12">
            <label for="complemento" class="form-label">Complemento</label>
            <input type="text" class="form-control" id="complemento" name="complemento" placeholder="Casa, Apartamento">
        </div>

        <div class="col-md-6">
            <label for="cidade" class="form-label">Cidade</label>
            <input type="text" class="form-control" id="cidade" name="cidade">
        </div>

        <div class="col-md-4">
            <label for="uf" class="form-label">UF</label>
            <select id="uf" name="uf" class="form-select">
                <option selected disabled>Selecione</option>

                <option>AC</option>
                <option>AL</option>
                <option>AP</option>
                <option>AM</option>
                <option>BA</option>
                <option>CE</option>
                <option>DF</option>
                <option>ES</option>
                <option>GO</option>
                <option>MA</option>
                <option>MT</option>
                <option>MS</option>
                <option>MG</option>
                <option>PA</option>
                <option>PB</option>
                <option>PR</option>
                <option>PE</option>
                <option>PI</option>
                <option>RJ</option>
                <option>RN</option>
                <option>RS</option>
                <option>RO</option>
                <option>RR</option>
                <option>SC</option>
                <option>SP</option>
                <option>SE</option>
                <option>TO</option>
            </select>
        </div>

        <div class="col-md-2">
            <label for="cep" class="form-label">CEP</label>
            <input type="text" class="form-control" id="cep" name="cep">
        </div>

        <div class="col-12">
            <label for="foto" class="form-label">Foto</label>
            <input class="form-control form-control-lg" id="foto" name="foto" type="file">
        </div>

        <div class="col-md-6">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" name="senha">
        </div>

        <div class="col-md-6">
            <label for="confirmar_senha" class="form-label">Confirmar Senha</label>
            <input type="password" class="form-control" id="confirmar_senha" name="confirmar_senha">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>

    </form>
</div>

{% endblock %}
